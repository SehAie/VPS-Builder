project_name: VPS-Builder

server:
  ip: "1.2.3.4"
  user: "root"
  old_port: 22
  # password: "Do not write real passwords here. Use --ask-password during deploy."

ssh:
  new_port: 2222
  key_name: "VPS-Builder-Key"
  disable_password_login: true
  permit_root_login: "prohibit-password"
  max_auth_tries: 3

system:
  update_packages: true
  enable_bbr: true
  optimize_sysctl: true
  disable_ipv6: false

hysteria:
  enabled: true
  listen_port: 8443
  password: "auto"
  tls:
    mode: "self-signed"
    common_name: "bing.com"
  generate_client_config: true

paths:
  base_dir: ""
  keys_dir: ""
  client_dir: ""
